name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  # Build and deploy only on push to main
  build_and_deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Validate frontend environment variable
        run: |
          if [ -z "${VITE_API_URL}" ]; then
            echo "VITE_API_URL is missing. Set it in GitHub Secrets or Variables."
            exit 1
          fi
          echo "VITE_API_URL is set."
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}

      - name: Build and Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"      # React/Vite source folder
          api_location: ""                # Optional: your API folder
          output_location: "dist"         # Output folder after build

  # PR build check (optional, no deployment)
  pr_build_check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: PR Build Check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate frontend environment variable
        run: |
          if [ -z "${VITE_API_URL}" ]; then
            echo "VITE_API_URL is missing. Set it in GitHub Secrets or Variables."
            exit 1
          fi
          echo "VITE_API_URL is set."
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
